# --------------------------------------------------
# Server
# --------------------------------------------------
server.port=8089

# --------------------------------------------------
# Application
# --------------------------------------------------
spring.application.name=report-service
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

# --------------------------------------------------
# Database (MySQL)
# --------------------------------------------------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --------------------------------------------------
# JPA / Hibernate
# --------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# --------------------------------------------------
# RabbitMQ (Connection)
# --------------------------------------------------
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USERNAME:rabbitmq}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:rabbitmq@90}

# --------------------------------------------------
# Eureka
# --------------------------------------------------
eureka.client.service-url.defaultZone=http://${EUREKA_HOST:localhost}:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# --------------------------------------------------
# JWT
# --------------------------------------------------
jwt.secret=${JWT_SECRET}

# --------------------------------------------------
# Gemini / OpenAI / Rule-Based Analysis
# --------------------------------------------------
ai.provider=${AI_PROVIDER:GEMINI}
gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta}
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
ai.api.url=${AI_API_URL:https://api.openai.com/v1}
ai.api.key=${AI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4o-mini}
openai.max-output-tokens=${OPENAI_MAX_OUTPUT_TOKENS:600}
openai.temperature=0.2

# --------------------------------------------------
# RabbitMQ (Custom Exchange & Queues)
# --------------------------------------------------
rabbitmq.exchange.notification=connectsphere.notification
rabbitmq.routing-key.report-action=report.action
rabbitmq.routing-key.admin-escalation=report.escalated

# --------------------------------------------------
# Business Rules
# --------------------------------------------------
report.auto-escalation.threshold=5
report.auto-escalation.window-hours=24

# --------------------------------------------------
# Feign
# --------------------------------------------------
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=10000

# --------------------------------------------------
# Swagger
# --------------------------------------------------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# --------------------------------------------------
# Logging
# --------------------------------------------------
logging.level.com.connectsphere.report_service=DEBUG
logging.level.org.springframework.security=INFO
logging.file.name=logs/report-service.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
