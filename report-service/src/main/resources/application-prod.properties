spring.application.name=report-service
server.port=8089

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false

spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

eureka.client.service-url.defaultZone=${EUREKA_SERVER:http://eureka-server:8761/eureka/}
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

jwt.secret=${JWT_SECRET}

ai.provider=${AI_PROVIDER:GEMINI}
gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta}
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
ai.api.url=${AI_API_URL:https://api.openai.com/v1}
ai.api.key=${AI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4o-mini}
openai.max-output-tokens=${OPENAI_MAX_OUTPUT_TOKENS:600}
openai.temperature=0.2

rabbitmq.exchange.notification=connectsphere.notification
rabbitmq.routing-key.report-action=report.action
rabbitmq.routing-key.admin-escalation=report.escalated

report.auto-escalation.threshold=5
report.auto-escalation.window-hours=24

logging.level.com.connectsphere.report_service=INFO
logging.level.org.springframework.security=INFO
logging.file.name=logs/report-service.log

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
