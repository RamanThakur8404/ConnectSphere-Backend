# Application identity
spring.application.name=post-service
server.port = 8082

# -----------------------------------------------------------------------------
# MySQL DataSource
# -----------------------------------------------------------------------------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -----------------------------------------------------------------------------
# Spring Data JPA / Hibernate
# -----------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# -----------------------------------------------------------------------------
# Eureka — Service Discovery
# All services register themselves; all traffic goes through Gateway API
# -----------------------------------------------------------------------------
#eureka.client.enabled = false
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# -----------------------------------------------------------------------------
# Logging — SLF4J backed by Logback
# Log file stored at logs/post-service.log (created at runtime)
# -----------------------------------------------------------------------------
logging.level.com.connectsphere.post=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

logging.file.name=logs/post-service.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n

# Keep 30 days of log history, max 10MB per file
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

#  RabbitMQ ─────────────────────────────────────────────────────────────────
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:rabbitmq}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:rabbitmq@90}
spring.rabbitmq.virtual-host=/

#  Swagger / SpringDoc ──────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

#  JWT ─────────────────────────────────────────────────────────────────────
# JWT_SECRET removed - service uses Gateway headers
