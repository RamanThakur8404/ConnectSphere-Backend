      DB_PASSWORD: ${DB_PASSWORD}
      AUTH_DB_USERNAME: ${DB_USERNAME}
      AUTH_DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      EUREKA_SERVER: http://eureka-server:8761/eureka/
      OAUTH2_GOOGLE_REDIRECT_URI: ${OAUTH2_GOOGLE_REDIRECT_URI}
      FRONTEND_OAUTH2_REDIRECT_URI: ${FRONTEND_OAUTH2_REDIRECT_URI}
      APP_SEED_ADMIN_ENABLED: ${APP_SEED_ADMIN_ENABLED:-false}
      APP_SEED_ADMIN_EMAIL: ${APP_SEED_ADMIN_EMAIL:-}
      APP_SEED_ADMIN_USERNAME: ${APP_SEED_ADMIN_USERNAME:-}
      APP_SEED_ADMIN_PASSWORD: ${APP_SEED_ADMIN_PASSWORD:-}
      APP_SEED_ADMIN_FULL_NAME: ${APP_SEED_ADMIN_FULL_NAME:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_SECRET_KEY: ${GOOGLE_SECRET_KEY}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      eureka-server:
        condition: service_started
