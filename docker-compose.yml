x-java-env: &java-env
  JAVA_TOOL_OPTIONS: "-XX:MaxRAM=512m"
  EUREKA_CLIENT_INITIAL_INSTANCE_INFO_REPLICATION_INTERVAL_SECONDS: 5
  EUREKA_CLIENT_REGISTRY_FETCH_INTERVAL_SECONDS: 5
  EUREKA_INSTANCE_LEASE_RENEWAL_INTERVAL_IN_SECONDS: 10

x-spring-db-env: &spring-db-env
  <<: *java-env
  SPRING_JPA_HIBERNATE_DDL_AUTO: update

services:
  mysql:
    image: mysql:8.4
    container_name: connectsphere-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: auth_db
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}
      interval: 10s
      timeout: 20s
      retries: 10
      start_period: 30s
    networks:
      - connectsphere-network

  redis:
    image: redis:7-alpine
    container_name: connectsphere-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 20s
      retries: 10
      start_period: 10s
    networks:
      - connectsphere-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: connectsphere-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - -q
        - ping
      interval: 10s
      timeout: 20s
      retries: 10
      start_period: 30s
    networks:
      - connectsphere-network

  eureka-server:
    cpus: 0.5
    mem_limit: 512m
    image: ramanthakur06/eureka-server:latest
    container_name: connectsphere-eureka-server
    restart: unless-stopped
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    environment:
      <<: *java-env
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: >
        -Xms128M
        -Xmx256m
        -XX:+UseSerialGC
    ports:
      - "8761:8761"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q --spider http://localhost:8761/ || exit 1
      interval: 10s
      timeout: 20s
      retries: 15
      start_period: 30s
    networks:
      - connectsphere-network

  api-gateway:
    cpus: 0.5
    mem_limit: 512m
    image: ramanthakur06/api-gateway:latest
    container_name: connectsphere-api-gateway
    restart: unless-stopped
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    environment:
      <<: *java-env
      JAVA_TOOL_OPTIONS: >
        -Xms128M
        -Xmx256m
        -XX:+UseSerialGC
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      SPRING_DATA_REDIS_HOST: redis
      EUREKA_SERVER: http://eureka-server:8761/eureka/
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      AUTH_SERVICE_URI: http://auth-service:8081
      POST_SERVICE_URI: http://post-service:8082
      COMMENT_SERVICE_URI: http://comment-service:8083
      LIKE_SERVICE_URI: http://like-service:8084
      FOLLOW_SERVICE_URI: http://follow-service:8085
      NOTIFICATION_SERVICE_URI: http://notification-service:8086
      SEARCH_SERVICE_URI: http://search-service:8087
      MEDIA_SERVICE_URI: http://media-service:8088
      REPORT_SERVICE_URI: http://report-service:8089
      MESSAGE_SERVICE_URI: http://message-service:8090
      MESSAGE_SERVICE_WS_URI: ws://message-service:8090
      PAYMENT_SERVICE_URI: http://payment-service:8091
      ADMIN_SERVICE_URI: http://admin-service:8092
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_started
      redis:
        condition: service_started
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q --spider http://localhost:8080/actuator/health || exit 1
      interval: 10s
      timeout: 20s
      retries: 10
      start_period: 300s
    networks:
      - connectsphere-network

