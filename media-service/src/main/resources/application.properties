spring.application.name=media-service
server.port=8088

#  MySQL DataSource 
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#  JPA / Hibernate 
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#  Eureka Client 
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# JWT 
# (Unused by this service)
# jwt.secret=${JWT_SECRET}

# Storage provider: "cloudinary" (default) or "local"
connectsphere.media.storage-provider=${MEDIA_STORAGE_PROVIDER:cloudinary}

# Cloudinary credentials
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your_cloud_name}
cloudinary.api-key=${CLOUDINARY_API_KEY:your_api_key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your_api_secret}

# Media upload limits
connectsphere.media.upload.max-file-size=${MEDIA_UPLOAD_MAX_FILE_SIZE:50MB}
connectsphere.media.upload.max-request-size=${MEDIA_UPLOAD_MAX_REQUEST_SIZE:60MB}
connectsphere.media.upload.storage-dir=${MEDIA_STORAGE_DIR:uploads}
connectsphere.media.upload.public-base-url=${MEDIA_PUBLIC_BASE_URL:http://localhost:8080}

# Multipart upload limits
spring.servlet.multipart.max-file-size=${connectsphere.media.upload.max-file-size}
spring.servlet.multipart.max-request-size=${connectsphere.media.upload.max-request-size}

#  Logging 
logging.level.com.connectsphere.media_service=DEBUG
logging.level.org.springframework.web=INFO
logging.file.name=logs/media-service.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
