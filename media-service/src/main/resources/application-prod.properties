spring.application.name=media-service
server.port=8088

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

eureka.client.service-url.defaultZone=${EUREKA_SERVER:http://eureka-server:8761/eureka/}
eureka.instance.prefer-ip-address=true

spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.repositories.enabled=false

spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.virtual-host=/

connectsphere.media.storage-provider=${MEDIA_STORAGE_PROVIDER:local}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your_cloud_name}
cloudinary.api-key=${CLOUDINARY_API_KEY:your_api_key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your_api_secret}

connectsphere.media.upload.max-file-size=${MEDIA_UPLOAD_MAX_FILE_SIZE:50MB}
connectsphere.media.upload.max-request-size=${MEDIA_UPLOAD_MAX_REQUEST_SIZE:60MB}
connectsphere.media.upload.storage-dir=${MEDIA_STORAGE_DIR:uploads}
connectsphere.media.upload.public-base-url=${MEDIA_PUBLIC_BASE_URL:http://localhost:8080}

spring.servlet.multipart.max-file-size=${connectsphere.media.upload.max-file-size}
spring.servlet.multipart.max-request-size=${connectsphere.media.upload.max-request-size}

logging.level.com.connectsphere.media_service=INFO
logging.level.org.springframework.web=INFO
logging.file.name=logs/media-service.log

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
