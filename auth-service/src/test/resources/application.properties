# ===== H2 in-memory DB for tests =====
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# ===== Disable Eureka in tests =====
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# ===== JWT (dummy secret for tests) =====
# JWT_SECRET removed - service uses Gateway headers

# ===== Disable Redis auto-configuration in unit tests =====
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# ===== Disable RabbitMQ in tests =====
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# ===== Swagger =====
springdoc.api-docs.enabled=false

# ===== OAuth2 (placeholder values) =====
app.frontend.oauth2-redirect-uri=http://localhost:5173/auth/callback
spring.security.oauth2.client.registration.google.client-id=test-google-id
spring.security.oauth2.client.registration.google.client-secret=test-google-secret
spring.security.oauth2.client.registration.google.scope=profile,email
