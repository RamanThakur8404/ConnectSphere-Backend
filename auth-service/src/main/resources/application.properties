spring.application.name=auth-service
server.port = 8081

# MySql 
spring.datasource.url= ${DB_URL}
spring.datasource.username = ${AUTH_DB_USERNAME:${DB_USERNAME}}
spring.datasource.password = ${AUTH_DB_PASSWORD:${DB_PASSWORD}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# EUREKA CLIENT
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_SERVER:http://localhost:8761/eureka/}

# JPA Config
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Logging — log file mandatory for case study evaluation
logging.file.name=logs/connectsphere-auth.log
logging.level.com.connectsphere=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# App Frontend settings
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:5173}
app.frontend.oauth2-redirect-uri=${FRONTEND_OAUTH2_REDIRECT_URI:http://localhost:5173/auth/callback}
spring.security.oauth2.client.registration.google.redirect-uri=${OAUTH2_GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
server.forward-headers-strategy=framework

# ===== Redis Config =====
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ===== RabbitMQ Config =====
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# ===== JWT Config =====
jwt.secret=${JWT_SECRET}
jwt.access-token-expiry-ms=86400000
jwt.refresh-token-expiry-ms=604800000

# OAuth2 Configuration (placeholders)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_SECRET_KEY}
spring.security.oauth2.client.registration.google.scope=profile,email

# ===== Swagger / OpenAPI =====
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ===== Mail Config =====
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
